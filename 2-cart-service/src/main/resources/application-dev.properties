spring.application.name=cart-service

server.port=8032

management.endpoints.web.exposure.include=*

logging.pattern.level='%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]'

#connection with databse
spring.datasource.url = jdbc:mysql://localhost:3306/jecartdb?createDatabaseIfNotExist=true
spring.datasource.username = root
spring.datasource.password = India@1234
spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql=true

#eureka properties
eureka.client.service-url.defaultZone = http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
#it will be useful only in containers
eureka.instance.prefer-ip-address=true

logging.level.com.netflix.eureka=OFF
logging.level.com.netflix.discovery=OFF

#circuit breaker configuration

management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

resilience4j.circuitbreaker.instances.productServiceCB.sliding-window-size=6
resilience4j.circuitbreaker.instances.productServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.productServiceCB.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.productServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.productServiceCB.automatic-transition-from-open-to-half-open-enabled=true











